services:
  produtocomia:
    image: nginx:alpine
    container_name: produtocomia
    restart: unless-stopped
    depends_on:
      download-leads:
        condition: service_healthy
    volumes:
      - ./html:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"

      # Router principal (sem www)
      - "traefik.http.routers.produtocomia.rule=Host(`produtocomia.com.br`) || Host(`produtocomia.76.13.173.181.nip.io`)"
      - "traefik.http.routers.produtocomia.entrypoints=websecure"
      - "traefik.http.routers.produtocomia.tls.certresolver=letsencrypt"
      - "traefik.http.services.produtocomia.loadbalancer.server.port=80"

      # Router www -> redireciona para sem www (SEO)
      - "traefik.http.routers.produtocomia-www.rule=Host(`www.produtocomia.com.br`)"
      - "traefik.http.routers.produtocomia-www.entrypoints=websecure"
      - "traefik.http.routers.produtocomia-www.tls.certresolver=letsencrypt"
      - "traefik.http.routers.produtocomia-www.middlewares=redirect-www"

      # Middleware de redirecionamento permanente
      - "traefik.http.middlewares.redirect-www.redirectregex.regex=^https://www\\.(.+)"
      - "traefik.http.middlewares.redirect-www.redirectregex.replacement=https://$$1"
      - "traefik.http.middlewares.redirect-www.redirectregex.permanent=true"

  download-leads:
    build:
      context: .
      dockerfile: services/download-leads/Dockerfile
    container_name: produtocomia-download-leads
    restart: unless-stopped
    user: "${DOWNLOAD_LEADS_UID:-1000}:${DOWNLOAD_LEADS_GID:-1000}"
    env_file:
      - .env.download-leads
    volumes:
      - ./lead-data:/data
      - ./private-downloads:/app/downloads:ro
    networks:
      - proxy
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8787/api/download-leads/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  proxy:
    external: true
