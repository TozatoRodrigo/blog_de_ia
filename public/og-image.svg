  <text x="970" y="178" font-family="monospace" font-size="14" fill="#f4f4f0" text-anchor="middle" letter-spacing="3">SPECS</text>

  <text x="820" y="220" font-family="monospace" font-size="12" fill="#6a6a6a" letter-spacing="1">FREQUÊNCIA</text>
  <text x="820" y="245" font-family="Inter, sans-serif" font-size="20" fill="#0a0a0a" font-weight="700">Diária</text>

