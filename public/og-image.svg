    <line x1="1120" y1="40" x2="1160" y2="40"/><line x1="1140" y1="20" x2="1140" y2="60"/>
    <line x1="40" y1="590" x2="80" y2="590"/><line x1="60" y1="570" x2="60" y2="610"/>
    <line x1="1120" y1="590" x2="1160" y2="590"/><line x1="1140" y1="570" x2="1140" y2="610"/>
  </g>

