  <rect x="800" y="470" width="340" height="40" fill="#e61919"/>
  <text x="970" y="496" font-family="monospace" font-size="14" fill="#f4f4f0" text-anchor="middle" letter-spacing="3">PRODUTOCOMIA.COM.BR</text>

