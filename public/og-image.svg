<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#f4f4f0"/>

  <!-- Border -->
  <line x1="0" y1="0" x2="1200" y2="0" stroke="#0a0a0a" stroke-width="4"/>
  <line x1="0" y1="630" x2="1200" y2="630" stroke="#0a0a0a" stroke-width="4"/>
  <line x1="0" y1="0" x2="0" y2="630" stroke="#0a0a0a" stroke-width="4"/>
  <line x1="1200" y1="0" x2="1200" y2="630" stroke="#0a0a0a" stroke-width="4"/>

  <!-- Crosshairs -->
  <g stroke="#0a0a0a" stroke-width="1">
