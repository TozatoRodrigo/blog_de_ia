  <text x="820" y="310" font-family="Inter, sans-serif" font-size="20" fill="#0a0a0a" font-weight="700">PMs · POs · Tech</text>

  <text x="820" y="350" font-family="monospace" font-size="12" fill="#6a6a6a" letter-spacing="1">FOCO</text>
